name: Bug Report
description: Report a bug in Crusty
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Crusty
        2. Navigate to ...
        3. Press ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, terminal emulator, Rust version, Crusty version
      placeholder: |
        - OS: Ubuntu 24.04
        - Terminal: Alacritty 0.13
        - Rust: 1.78.0
        - Crusty: 0.1.0
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: If applicable, add screenshots or terminal recordings.
    validations:
      required: false
